name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install development dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run syntax, manifest, and test checks
        run: npm run check

      - name: Build extension ZIPs
        run: npm run package

      - name: Upload controlled browser variants
        uses: actions/upload-artifact@v4
        with:
          name: lexpack-browser-variants
          path: |
            dist/lexpack-chrome-*.zip
            dist/lexpack-chromium-gost-*.zip
            dist/release-index.json
            dist/SHA256SUMS
          if-no-files-found: error
